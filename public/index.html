<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Easy to use calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== ログイン画面（LINEログイン） ========== -->
  <div id="auth-view" class="auth-view">
    <div class="auth-card">
      <h1 class="logo"> Easy to use calendar</h1>
      <p class="auth-subtitle">LINEアカウントでログインして<br>自分専用のカレンダーを使いましょう</p>

      <p id="auth-error" class="error-msg"></p>
      <button type="button" id="line-login-btn" class="btn-line hidden">LINEでログイン</button>
      <p id="auth-status" class="auth-status">読み込み中…</p>
    </div>
  </div>

  <!-- ========== カレンダー画面 ========== -->
  <div id="app-view" class="app-view hidden">
    <header class="app-header">
      <div class="cal-nav">
        <button id="prev-month" class="nav-btn">‹</button>
        <h2 id="month-label">2026年 6月</h2>
        <button id="next-month" class="nav-btn">›</button>
        <button id="today-btn" class="today-btn">今日</button>
        <button id="jump-btn" class="today-btn">月を選択</button>
        <button id="list-btn" class="today-btn">予定一覧</button>
      </div>
      <div class="user-box">
        <span id="user-label"></span>
        <button id="logout-btn" class="logout-btn">ログアウト</button>
      </div>
    </header>

    <!-- 年・月を指定してジャンプ（「月を選択」で開閉）-->
    <div id="month-picker" class="month-picker hidden">
      <label>年 <select id="year-select"></select></label>
      <label>月 <select id="month-select"></select></label>
      <button id="picker-go" class="btn-primary">移動</button>
    </div>

    <div class="weekday-row">
      <div class="sun">日</div><div>月</div><div>火</div><div>水</div>
      <div>木</div><div>金</div><div class="sat">土</div>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </div>

  <!-- ========== 予定モーダル ========== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-date">予定</h3>
        <button id="modal-close" class="modal-close">×</button>
      </div>

      <!-- その日の予定一覧 -->
      <div id="schedule-list" class="schedule-list"></div>

      <!-- 予定追加フォーム -->
      <form id="schedule-form" class="schedule-form">
        <div class="time-row">
          <label>開始
            <input type="time" id="start-time" />
          </label>
          <label>終了
            <input type="time" id="end-time" />
          </label>
        </div>
        <label>内容
          <input type="text" id="content" required placeholder="例: 会議、打ち合わせ"
                 list="content-history" autocomplete="off" />
          <!-- 過去に入力した内容の候補（入力時にさかのぼって選べる） -->
          <datalist id="content-history"></datalist>
        </label>
        <button type="submit" class="btn-primary">＋ 予定を追加</button>
      </form>

      <!-- これまでの予定の履歴（さかのぼって閲覧）-->
      <details class="history-box">
        <summary>これまでの予定をさかのぼる</summary>
        <div id="history-list" class="history-list"></div>
      </details>
    </div>
  </div>

  <!-- ========== 予定一覧（全予定・並び替え可能） ========== -->
  <div id="list-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>予定一覧</h3>
        <button id="list-close" class="modal-close">×</button>
      </div>
      <input type="search" id="search-input" class="search-input"
             placeholder="🔍 予定名で検索" autocomplete="off" />
      <label class="sort-row">並び替え
        <select id="sort-select">
          <option value="date-asc">日付（古い順）</option>
          <option value="date-desc">日付（新しい順）</option>
          <option value="time-asc">時間（早い順）</option>
          <option value="content-asc">内容（あいうえお順）</option>
        </select>
      </label>
      <ul id="all-list" class="all-list"></ul>
    </div>
  </div>

  <!-- LIFF SDK（LINE内アプリ化のための公式ライブラリ）-->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="script.js"></script>
</body>
</html>
