# ============================================================
# render.yaml : Render (https://render.com) デプロイ設定
# ------------------------------------------------------------
# GitHubリポジトリと連携して、この設定どおりにWebサービスを作成する。
# Renderダッシュボードの「New +」→「Blueprint」からこのファイルを読み込むと
# 自動で下記の構成が作られる（手動設定でも同じ内容を入力すればOK）。
# ============================================================
services:
  - type: web
    name: calendar-app
    runtime: node
    plan: free                 # 無料プラン
    buildCommand: npm install  # 依存パッケージのインストール
    startCommand: npm start    # = node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true    # ランダムな秘密鍵をRenderが自動生成

    # ========================================================
    # ★データを消えなくしたい場合（有料プランが必要）★
    # 無料プランはディスクが揮発性なので、以下の永続ディスクは使えません。
    # 有料プラン(starter以上)に変更したうえで、次の2つを有効化すると
    # /data にDBが保存され、再デプロイ・再起動でも消えなくなります。
    # （db.js は DATABASE_PATH を読むよう既に対応済み）
    # --------------------------------------------------------
    # disk:
    #   name: data
    #   mountPath: /data       # 永続ディスクのマウント先
    #   sizeGB: 1
    # envVars に追記:
    #   - key: DATABASE_PATH
    #     value: /data/calendar.db
    # ========================================================
